<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单俄罗斯方块</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(90, 90, 120, 0.4), transparent 35%),
        #101014;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: #f4f4f8;
    }

    .game-shell {
      width: min(92vw, 560px);
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    canvas {
      width: 280px;
      height: 560px;
      display: block;
      border-radius: 12px;
      background: #0a0a0d;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel {
      display: grid;
      align-content: start;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.9rem;
      line-height: 1;
    }

    .card {
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .label {
      margin: 0 0 6px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.66);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.82);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #141418;
      background: #f6c85f;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .hint {
      margin: 0;
      color: rgba(255, 255, 255, 0.62);
      line-height: 1.7;
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      .game-shell {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <canvas id="board" width="280" height="560" aria-label="俄罗斯方块画布"></canvas>

    <section class="panel">
      <div>
        <h1>俄罗斯方块</h1>
        <p class="hint">一个很简单的小版本，拿来打发时间刚刚好。</p>
      </div>

      <div class="card">
        <p class="label">Score</p>
        <p class="score" id="score">0</p>
      </div>

      <div class="card">
        <p class="label">Controls</p>
        <ul>
          <li>左 / 右 或 A / D：移动</li>
          <li>下 或 S：加速下落</li>
          <li>上 或 W：旋转</li>
          <li>空格：直接落到底</li>
        </ul>
      </div>

      <button id="restart" type="button">重新开始</button>
      <p class="hint">消掉整行会加分。堆到顶部就结束。</p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const context = canvas.getContext("2d");
    const scoreNode = document.getElementById("score");
    const restartButton = document.getElementById("restart");

    const COLS = 10;
    const ROWS = 20;
    const CELL = 28;
    const DROP_INTERVAL = 520;

    const COLORS = {
      I: "#69d2ff",
      J: "#7f8cff",
      L: "#ff9a5a",
      O: "#f6c85f",
      S: "#76f2ac",
      T: "#d289ff",
      Z: "#ff6b6b"
    };

    const SHAPES = [
      { type: "I", matrix: [[1, 1, 1, 1]] },
      { type: "J", matrix: [[1, 0, 0], [1, 1, 1]] },
      { type: "L", matrix: [[0, 0, 1], [1, 1, 1]] },
      { type: "O", matrix: [[1, 1], [1, 1]] },
      { type: "S", matrix: [[0, 1, 1], [1, 1, 0]] },
      { type: "T", matrix: [[0, 1, 0], [1, 1, 1]] },
      { type: "Z", matrix: [[1, 1, 0], [0, 1, 1]] }
    ];

    let board = [];
    let current = null;
    let score = 0;
    let gameOver = false;
    let lastDrop = 0;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(""));
    }

    function cloneMatrix(matrix) {
      return matrix.map((row) => [...row]);
    }

    function randomPiece() {
      const piece = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const matrix = cloneMatrix(piece.matrix);
      return {
        type: piece.type,
        matrix,
        x: Math.floor((COLS - matrix[0].length) / 2),
        y: 0
      };
    }

    function rotateMatrix(matrix) {
      return matrix[0].map((_, col) => matrix.map((row) => row[col]).reverse());
    }

    // 检查方块是否会撞到边界或已有方块。
    function collides(matrix, offsetX, offsetY) {
      for (let row = 0; row < matrix.length; row += 1) {
        for (let col = 0; col < matrix[row].length; col += 1) {
          if (!matrix[row][col]) {
            continue;
          }

          const x = offsetX + col;
          const y = offsetY + row;

          if (x < 0 || x >= COLS || y >= ROWS) {
            return true;
          }

          if (y >= 0 && board[y][x]) {
            return true;
          }
        }
      }

      return false;
    }

    function mergeCurrentPiece() {
      for (let row = 0; row < current.matrix.length; row += 1) {
        for (let col = 0; col < current.matrix[row].length; col += 1) {
          if (!current.matrix[row][col]) {
            continue;
          }

          const x = current.x + col;
          const y = current.y + row;

          if (y >= 0) {
            board[y][x] = current.type;
          }
        }
      }
    }

    function clearLines() {
      let cleared = 0;

      for (let row = ROWS - 1; row >= 0; row -= 1) {
        if (board[row].every(Boolean)) {
          board.splice(row, 1);
          board.unshift(Array(COLS).fill(""));
          cleared += 1;
          row += 1;
        }
      }

      if (cleared > 0) {
        score += cleared * 100;
        scoreNode.textContent = String(score);
      }
    }

    function spawnPiece() {
      current = randomPiece();
      if (collides(current.matrix, current.x, current.y)) {
        gameOver = true;
      }
    }

    function hardDrop() {
      if (gameOver) {
        return;
      }

      while (!collides(current.matrix, current.x, current.y + 1)) {
        current.y += 1;
      }

      lockPiece();
    }

    function lockPiece() {
      mergeCurrentPiece();
      clearLines();
      spawnPiece();
    }

    function drop() {
      if (gameOver) {
        return;
      }

      if (!collides(current.matrix, current.x, current.y + 1)) {
        current.y += 1;
      } else {
        lockPiece();
      }
    }

    function move(deltaX) {
      if (gameOver) {
        return;
      }

      const nextX = current.x + deltaX;
      if (!collides(current.matrix, nextX, current.y)) {
        current.x = nextX;
      }
    }

    // 旋转失败时顺手尝试左右挪一格，保证体验别太笨。
    function rotate() {
      if (gameOver) {
        return;
      }

      const rotated = rotateMatrix(current.matrix);
      if (!collides(rotated, current.x, current.y)) {
        current.matrix = rotated;
        return;
      }

      if (!collides(rotated, current.x - 1, current.y)) {
        current.x -= 1;
        current.matrix = rotated;
        return;
      }

      if (!collides(rotated, current.x + 1, current.y)) {
        current.x += 1;
        current.matrix = rotated;
      }
    }

    function drawCell(x, y, color) {
      context.fillStyle = color;
      context.fillRect(x * CELL, y * CELL, CELL, CELL);
      context.strokeStyle = "rgba(255, 255, 255, 0.09)";
      context.strokeRect(x * CELL + 0.5, y * CELL + 0.5, CELL - 1, CELL - 1);
    }

    function drawBoard() {
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = "#0a0a0d";
      context.fillRect(0, 0, canvas.width, canvas.height);

      for (let row = 0; row < ROWS; row += 1) {
        for (let col = 0; col < COLS; col += 1) {
          if (board[row][col]) {
            drawCell(col, row, COLORS[board[row][col]]);
          } else {
            context.strokeStyle = "rgba(255, 255, 255, 0.04)";
            context.strokeRect(col * CELL + 0.5, row * CELL + 0.5, CELL - 1, CELL - 1);
          }
        }
      }
    }

    function drawCurrentPiece() {
      if (!current) {
        return;
      }

      for (let row = 0; row < current.matrix.length; row += 1) {
        for (let col = 0; col < current.matrix[row].length; col += 1) {
          if (current.matrix[row][col]) {
            drawCell(current.x + col, current.y + row, COLORS[current.type]);
          }
        }
      }
    }

    function drawOverlay() {
      if (!gameOver) {
        return;
      }

      context.fillStyle = "rgba(0, 0, 0, 0.58)";
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.fillStyle = "#ffffff";
      context.textAlign = "center";
      context.font = "bold 30px Segoe UI";
      context.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 12);
      context.font = "16px Segoe UI";
      context.fillText("点右边按钮重新开始", canvas.width / 2, canvas.height / 2 + 20);
    }

    function render() {
      drawBoard();
      drawCurrentPiece();
      drawOverlay();
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      scoreNode.textContent = "0";
      gameOver = false;
      lastDrop = 0;
      spawnPiece();
      render();
    }

    function update(time = 0) {
      if (!lastDrop) {
        lastDrop = time;
      }

      if (!gameOver && time - lastDrop > DROP_INTERVAL) {
        drop();
        lastDrop = time;
      }

      render();
      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", (event) => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        move(-1);
      } else if (event.code === "ArrowRight" || event.code === "KeyD") {
        move(1);
      } else if (event.code === "ArrowDown" || event.code === "KeyS") {
        drop();
      } else if (event.code === "ArrowUp" || event.code === "KeyW") {
        rotate();
      } else if (event.code === "Space") {
        event.preventDefault();
        hardDrop();
      }
    });

    restartButton.addEventListener("click", resetGame);

    resetGame();
    requestAnimationFrame(update);
  </script>
</body>
</html>
